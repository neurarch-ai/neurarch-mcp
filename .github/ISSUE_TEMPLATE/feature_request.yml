name: 💡 Feature request
description: Suggest a new capability, exporter, integration, or improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Tell us the **problem** first, not just the solution — that way we can think about whether your proposed fix is the best one, or whether there's a simpler approach.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What were you trying to do when you hit the wall? What's the workflow that doesn't work today?
      placeholder: "I'm prototyping vision models and want to compare two architectures side by side, but I have to keep duplicating the canvas tab."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Your proposed solution. Sketches, screenshots from other tools, or rough mockups are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the same problem — including workarounds you're using today.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      multiple: true
      options:
        - Canvas / visual editor
        - Agent panel
        - Code export
        - Training (Modal / GPU)
        - Templates / model zoo
        - Studio panel (model card, study guide, slides, deploy)
        - Account / billing / Pro features
        - Landing / marketing pages
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Final checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I described the underlying problem, not just my proposed solution.
          required: true
